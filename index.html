<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber AI System</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:#00ff99;
    font-family:Courier New, monospace;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

h1{
    font-size:50px;
    text-shadow:0 0 20px #00ff99;
}

p{
    font-size:20px;
}

input{
    margin-top:20px;
    padding:15px;
    width:300px;
    background:black;
    border:2px solid #00ff99;
    color:#00ff99;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    background:black;
    border:2px solid #00ff99;
    color:#00ff99;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ff99;
    color:black;
    box-shadow:0 0 20px #00ff99;
}

#result{
    margin-top:30px;
    font-size:24px;
    min-height:40px;
}

.secret{
    margin-top:20px;
    font-size:18px;
    opacity:0;
    transition:1s;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>AI SECURITY SYSTEM</h1>

<p>ENTER PASSWORD TO ACCESS DATABASE</p>

<input
type="password"
id="password"
placeholder="Enter password..."
>

<br>

<button onclick="login()">
LOGIN
</button>

<div id="result"></div>

<div id="secret" class="secret">
⚠️ ACCESS FILE OPENED...<br><br>
"Some memories should never be recovered."
</div>

</div>

<script>

// LOGIN SYSTEM

function login(){

    const password =
    document.getElementById("password").value;

    const result =
    document.getElementById("result");

    const secret =
    document.getElementById("secret");

    if(password === "narissara"){

        result.innerHTML =
        "✅ ACCESS GRANTED";

        result.style.color =
        "#00ff99";

        secret.style.opacity = 1;

    }else{

        result.innerHTML =
        "❌ ACCESS DENIED";

        result.style.color =
        "red";

        secret.style.opacity = 0;
    }
}

// MATRIX EFFECT

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const letters =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 14;

const columns =
canvas.width/fontSize;

const drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle =
"rgba(0,0,0,0.05)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"#00ff99";

ctx.font =
fontSize + "px monospace";

for(let i=0;i<drops.length;i++){

const text =
letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize >
canvas.height
&&
Math.random()>0.975
)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,35);

</script>

</body>
</html>
